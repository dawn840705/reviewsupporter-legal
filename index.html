<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="index, follow">
<title>리뷰를 부탁해 — 약관 및 개인정보처리방침</title>
<style>
  :root { --blue:#2F6BFF; --blue-soft:#EEF3FF; --bg:#F7F9FC; --ink:#1A2233; --muted:#5A6478; --line:#E2E8F4; }
  * { box-sizing:border-box; }
  html { -webkit-text-size-adjust:100%; }
  body {
    margin:0; background:var(--bg); color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Malgun Gothic",
      "Segoe UI",Roboto,sans-serif;
    line-height:1.7; -webkit-font-smoothing:antialiased;
  }
  .wrap { max-width:680px; margin:0 auto; padding:32px 20px 64px; }
  header { text-align:center; padding:24px 0 8px; }
  .logo {
    display:inline-flex; align-items:center; justify-content:center;
    width:64px; height:64px; border-radius:16px; background:var(--blue);
    color:#fff; font-size:30px; margin-bottom:14px;
  }
  h1 { font-size:22px; margin:0 0 6px; }
  .sub { color:var(--muted); font-size:14px; margin:0; }
  .cards { display:flex; flex-direction:column; gap:14px; margin-top:32px; }
  a.card {
    display:block; background:#fff; border:1px solid var(--line); border-radius:14px;
    padding:20px 22px; text-decoration:none; color:inherit;
    transition:border-color .15s, transform .1s;
  }
  a.card:hover { border-color:var(--blue); }
  a.card:active { transform:scale(.99); }
  .card-title { font-size:17px; font-weight:600; color:var(--blue); margin:0 0 4px; }
  .card-desc { font-size:14px; color:var(--muted); margin:0; }
  footer { text-align:center; color:var(--muted); font-size:13px; margin-top:40px; }
  footer a { color:var(--muted); }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="logo">💬</div>
    <h1>리뷰를 부탁해</h1>
    <p class="sub">약관 및 개인정보 처리 안내</p>
  </header>

  <div class="cards">
    <a class="card" href="privacy.html">
      <p class="card-title">개인정보처리방침</p>
      <p class="card-desc">어떤 정보를 어떻게 다루는지 — 기기 내 저장 원칙, AI 전송 항목, 익명 통계, 이용자 권리</p>
    </a>
    <a class="card" href="terms.html">
      <p class="card-title">이용약관</p>
      <p class="card-desc">서비스 이용 조건, 이용자의 의무, 면책 및 보증의 한계</p>
    </a>
  </div>

  <footer>
    문의 · <a href="mailto:dawn840705@gmail.com">dawn840705@gmail.com</a><br>
    시행일 2026년 6월 3일
  </footer>
</div>
</body>
</html>
