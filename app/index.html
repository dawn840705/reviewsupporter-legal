<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>리뷰를 부탁해 — 앱 다운로드</title>
<meta property="og:title" content="리뷰를 부탁해">
<meta property="og:description" content="리뷰 안 써서 놓친 네이버 적립금, AI가 초안까지 써줘 쉽게 챙겨요.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://dawn840705.github.io/reviewsupporter-legal/app/">
<meta property="og:image" content="https://dawn840705.github.io/reviewsupporter-legal/app/og.png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta property="og:image:alt" content="리뷰를 부탁해 — AI 리뷰 비서">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="리뷰를 부탁해">
<meta name="twitter:description" content="리뷰 안 써서 놓친 네이버 적립금, AI가 초안까지 써줘 쉽게 챙겨요.">
<meta name="twitter:image" content="https://dawn840705.github.io/reviewsupporter-legal/app/og.png">
<style>
  :root{--brand:#2F6BFF;--ink:#191C1E;--sub:#5B6270;--bg:#F7F9FC}
  *{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Malgun Gothic',sans-serif}
  body{background:var(--bg);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
  .card{max-width:380px;width:100%;text-align:center}
  .logo{width:84px;height:84px;border-radius:20px;display:block;margin:0 auto 18px;box-shadow:0 10px 28px rgba(47,107,255,.28)}
  h1{font-size:24px;font-weight:800;color:var(--ink);letter-spacing:-.5px}
  p{font-size:15px;color:var(--sub);margin:10px 0 26px;line-height:1.5}
  .btn{display:flex;align-items:center;justify-content:center;gap:8px;height:54px;border-radius:14px;font-size:16px;font-weight:700;text-decoration:none;margin-bottom:12px}
  .ios{background:#000;color:#fff}
  .aos{background:var(--brand);color:#fff}
  .note{font-size:12px;color:#9AA1AC;margin-top:14px}
</style>
<script>
(function(){
  var APPSTORE = "https://apps.apple.com/app/id6781089353";
  var PLAY = "https://play.google.com/store/apps/details?id=com.master.reviewmachine";
  var ua = navigator.userAgent || "";
  if (/iPhone|iPad|iPod/i.test(ua)) { location.replace(APPSTORE); }
  else if (/Android/i.test(ua)) { location.replace(PLAY); }
  // PC/기타: 아래 안내 페이지를 그대로 보여준다.
})();
</script>
</head>
<body>
  <div class="card">
    <img class="logo" src="./icon.png" alt="리뷰를 부탁해 앱 아이콘" width="84" height="84">
    <h1>리뷰를 부탁해</h1>
    <p>리뷰 안 써서 놓친 네이버 적립금,<br>AI가 초안까지 써줘 쉽게 챙겨요.</p>
    <a class="btn ios" href="https://apps.apple.com/app/id6781089353">🍎 App Store에서 받기</a>
    <a class="btn aos" href="https://play.google.com/store/apps/details?id=com.master.reviewmachine">▶ Google Play에서 받기</a>
    <div class="note">📱 휴대폰에서 열면 맞는 스토어로 자동 이동해요. (PC에선 위 버튼)</div>
  </div>
</body>
</html>
