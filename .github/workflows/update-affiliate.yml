name: Update affiliate.json (오퍼월 쇼핑적립)

# 하루 1회 affiliate.json 재생성: manual_offers.json(고정 식품 오퍼) + LinkPrice 오퍼월 자동(종합몰).
# 오퍼월 미설정(code:-6)/머천트 0이면 고정 오퍼만 출력 → 식품 오퍼(컬리·CJ) 항상 보존.
# ★수동 오퍼 편집은 affiliate.json이 아니라 manual_offers.json. 수동 실행: Actions 탭 → "Run workflow".

on:
  schedule:
    - cron: '0 18 * * *'   # UTC 18:00 = KST 03:00 (하루 1회)
  workflow_dispatch:        # 수동 트리거

permissions:
  contents: write

concurrency:
  group: update-affiliate
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 오퍼월 → affiliate.json 빌드
        run: python3 scripts/build_affiliate.py

      - name: JSON 유효성 검증
        run: python3 -m json.tool affiliate.json > /dev/null

      - name: 변경 있으면 커밋·푸시
        run: |
          if git diff --quiet -- affiliate.json; then
            echo "변경 없음 — 푸시 생략"
            exit 0
          fi
          git config user.name "affiliate-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add affiliate.json
          git commit -m "chore: 오퍼월 자동 갱신 affiliate.json [skip ci]"
          git push
