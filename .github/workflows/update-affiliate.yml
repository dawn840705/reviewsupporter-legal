name: Update affiliate.json (리얼 핫딜)

# 6시간마다 affiliate.json 재생성: manual_offers.json(고정 식품 오퍼) + LinkPrice 리얼 핫딜 API 자동.
# 핫딜 API는 종료 상품을 예고없이 제거 → 죽은 딥링크 줄이려 자주 갱신. 호출 실패/0건이면 고정 오퍼만 보존.
# ★수동 오퍼 편집은 affiliate.json이 아니라 manual_offers.json. 수동 실행: Actions 탭 → "Run workflow".

on:
  schedule:
    - cron: '0 */6 * * *'   # 6시간마다(링크 신선도 — 핫딜은 30분마다 갱신/상품 제거)
  workflow_dispatch:        # 수동 트리거

permissions:
  contents: write

concurrency:
  group: update-affiliate
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 핫딜 → affiliate.json 빌드
        run: python3 scripts/build_affiliate.py

      - name: JSON 유효성 검증
        run: python3 -m json.tool affiliate.json > /dev/null

      - name: 변경 있으면 커밋·푸시
        run: |
          if git diff --quiet -- affiliate.json; then
            echo "변경 없음 — 푸시 생략"
            exit 0
          fi
          git config user.name "affiliate-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add affiliate.json
          git commit -m "chore: 핫딜 자동 갱신 affiliate.json [skip ci]"
          git push
